name: build-image

# Construye la imagen multi-arch (arm64 + amd64) y la publica en GHCR.
# Tras el PRIMER push hay que hacer el package PÚBLICO una vez:
#   GitHub -> tu perfil -> Packages -> gh_runner -> Package settings ->
#   Change visibility -> Public
# (así deploy.sh puede hacer `pull` sin autenticación en cualquier máquina).

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - Containerfile
      - entrypoint.sh
      - .github/workflows/build-image.yml
  workflow_dispatch:
  schedule:
    # Lunes 06:00 UTC: reconstruye con la última versión de actions/runner para
    # no quedar por debajo del mínimo que exige GitHub.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/gh_runner

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Necesario para construir arm64 sobre un runner amd64 (emulación).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      # Resuelve la última versión de actions/runner para que cada build (sobre
      # todo el semanal) use la más reciente. contents:read basta para el repo público.
      - name: Resolve latest actions/runner version
        id: runnerver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(gh release view --repo actions/runner --json tagName -q .tagName)"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            RUNNER_VERSION=${{ steps.runnerver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
