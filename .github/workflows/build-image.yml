name: build-image

# Construye la imagen multi-arch (arm64 + amd64) y la publica en GHCR.
# Tras el PRIMER push hay que hacer el package PÚBLICO una vez:
#   GitHub -> tu perfil -> Packages -> gh_runner -> Package settings ->
#   Change visibility -> Public
# (así deploy.sh puede hacer `pull` sin autenticación en cualquier máquina).

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - Containerfile
      - entrypoint.sh
      - .github/workflows/build-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/gh_runner

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Necesario para construir arm64 sobre un runner amd64 (emulación).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
